version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: book_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: book_db
    volumes:
      - mongodb_data:/data/db
    networks:
      - book_network

  api:
    build: .
    container_name: book_api
    ports:
      - "8000:8000"
    environment:
      MONGO_URI: mongodb://admin:admin123@mongodb:27017
      MONGO_DB: book_db
    depends_on:
      - mongodb
    volumes:
      - ./app:/app/app
    networks:
      - book_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

networks:
  book_network:
    driver: bridge

volumes:
  mongodb_data:
